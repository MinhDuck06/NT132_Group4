---
- name: Cài đặt và cấu hình Apache Web Server trên Ubuntu
  hosts: webservers
  become: yes  # Chạy dưới quyền sudo
  tasks:

    - name: Cập nhật danh sách gói phần mềm (apt update)
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Cài đặt gói Apache2
      apt:
        name: apache2
        state: present

    - name: Đảm bảo dịch vụ Apache đã được khởi động và chạy cùng hệ thống
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Tạo file index.html chuẩn UTF-8
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>NetDevOps Project</title>
          </head>
          <body>
              <h1>Chào mừng đến với Web Server của Nhóm NetDevOps</h1>
              <p>Trạng thái: Đã triển khai thành công bằng Ansible Playbook.</p>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'
