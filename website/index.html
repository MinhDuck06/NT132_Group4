
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NT132 - Group 4 Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 450px;
        }
        h1 {
            color: #1a73e8;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .status {
            font-weight: bold;
            margin-bottom: 20px;
            color: #555;
        }
        .status-online {
            color: #28a745;
        }
        .info-box {
            background-color: #e8f0fe;
            border-radius: 10px;
            padding: 20px;
            text-align: left;
            margin-bottom: 20px;
        }
        .info-box h3 {
            margin-top: 0;
            font-size: 18px;
            color: #333;
        }
        ul {
            list-style-type: disc;
            padding-left: 20px;
            margin-bottom: 15px;
        }
        .footer {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gateway Nhóm 4</h1>
        <p class="status">Trạng thái hệ thống: <span class="status-online">● ONLINE</span></p>
        
        <div class="info-box">
            <h3>Mạng nội bộ:</h3>
            <ul>
                <li>VLAN 10: 192.168.10.1</li>
                <li>VLAN 20: 192.168.20.1</li>
            </ul>
            <p><strong>Dịch vụ:</strong> DHCP, NAT, Ansible</p>
        </div>

        <div class="footer">
            Phát triển bởi: Minh Đức & Văn Dũng & Hoàng Phúc - NT132.Q24
        </div>
    </div>
</body>
</html>
